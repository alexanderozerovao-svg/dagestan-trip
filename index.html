<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" sizes="32x32" href="./image/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./image/favicon.png">
  <link rel="apple-touch-icon" href="./image/favicon.png">
  
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""
/>
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

  <style>
    @font-face {
      font-family: 'DagestanCustom';
      src: url('./DagestaN%20.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root{
  --bg: #f6f6f4;
  --title: #074e29;
  --text: #1e2a22;
  --muted: rgba(30, 42, 34, 0.66);
  --card: rgba(255, 255, 255, 0.68);
  --card-border: rgba(7, 78, 41, 0.10);
  --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
  --day-bg: rgba(255, 255, 255, 0.72);
  --day-border: rgba(7, 78, 41, 0.12);

  --participant-size: 100px;
  --participant-gap: 20px;

  --day-size: 140px;
  --day-gap: 12px;
}

    *{
      box-sizing: border-box;
    }

    html,
    body{
      margin: 0;
      min-height: 100%;
    }

    body{
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    body::after{
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: min(260px, 32vh);
      background: var(--bg-image) bottom center / cover no-repeat;
      opacity: 0.9;
      pointer-events: none;
      z-index: -2;
    }

    body::before{
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: min(320px, 40vh);
      background: linear-gradient(
        to top,
        rgba(246, 246, 244, 0) 0%,
        rgba(246, 246, 244, 0.72) 48%,
        rgba(246, 246, 244, 1) 100%
      );
      pointer-events: none;
      z-index: -1;
    }

    .page{
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 28px 24px 34px;
      position: relative;
      z-index: 1;
    }

    .top{
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .title{
  margin: 0;
  font-family: 'DagestanCustom', serif;
  font-size: clamp(30px, 7vw, 90px);
  font-weight: 400;
  line-height: 1;
  letter-spacing: 0.03em;
  color: var(--title);
  text-transform: uppercase;
  text-align: center;

  max-width: calc(100% - 260px);
}
.trip-badge{
  position: absolute;

  top: 10px;      /* выше */
  left: 40px;     /* теперь слева */

  width: 200px;

  display: flex;
  flex-direction: column;
  align-items: center;

  z-index: 5;
}

.trip-badge-year{
  position: absolute;
  top: 30px;
  right: -60px;

  font-family: 'DagestanCustom', serif;
  font-size: 28px;
  font-weight: 400;
width: 200px;
  letter-spacing: 0.05em;
  color: #074e29;
display: flex;
  flex-direction: column;
  align-items: center;
  transform: rotate(0deg) translate(0,-5px);
text-shadow: 0 3px 6px rgba(0,0,0,0.15);
  z-index: 5;
}

.trip-badge-logo{
  width: 185px;
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.trip-badge-logo img{
  max-width: 100%;
  max-height: 100%;
  display: block;
  object-fit: contain;
}

.trip-badge-name{
  position: relative;

  top: -8px;      /* вниз / вверх */
  left: 0px;     /* вправо / влево */

  margin-top: 0;

  font-family: 'DagestanCustom', serif;
  font-size: 38px;
  line-height: 0.95;
  letter-spacing: 0.09em;

  color: #074e29;
  text-transform: uppercase;
  text-align: center;
}



  .participants{
  display: grid;
  grid-template-columns: repeat(var(--participants-count), var(--participant-size));
  gap: var(--participant-gap);

  width: fit-content;

  position: absolute;
  top: 200px;
  left: 50%;
  transform: translateX(-50%);
}

.participant{
  width: var(--participant-size);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.participant-photo{
  width: var(--participant-size);
  height: var(--participant-size);
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  box-shadow: var(--card-shadow);
  overflow: hidden;
}

.participant img{
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  object-position: center;
}

.participant-name{
  font-size: 14px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--title);
  text-align: center;
}

.participants{
  transition: gap 0.45s ease, transform 0.45s ease;
}

.participant{
  transition: transform 0.45s ease;
}

.participants.hug-ready{
  gap: 4px;
}

.participants.hug-ready::after{
  content: "";
  position: absolute;
  top: -78px;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  height: 110px;
  background: url("./image/people/kiss.png") center / contain no-repeat;
  z-index: 3;
  pointer-events: none;
}

.participants.hug-ready .participant:nth-child(1){
  transform: translateX(12px);
}

.participants.hug-ready .participant:nth-child(2){
  transform: translateX(4px);
}

.participants.hug-ready .participant:nth-child(3){
  transform: translateX(-4px);
}

.participants.hug-ready .participant:nth-child(4){
  transform: translateX(-12px);
}

  .bottom{
  position: absolute;
  top: 480px;
  left: 50%;
  transform: translateX(-50%);
  width: fit-content;
}

  .days{
  display: grid;
  grid-template-columns: repeat(var(--days-count), var(--day-size));
  gap: var(--day-gap);

  width: fit-content;
}

  .day-card{
  width: var(--day-size);
  height: var(--day-size);
  padding: 10px;
  border-radius: 16px;
  background: var(--day-bg);
  border: 1px solid var(--day-border);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  text-align: center;
}


    .day-name{
      font-size: 15px;
      font-weight: 700;
      color: var(--title);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      margin-top: 40px;
    }

.day-date{
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

/* ===== COUNTDOWN: ОСНОВНЫЕ СТИЛИ, НЕ ВНУТРИ MEDIA ===== */

.countdown-wrap{
  position: absolute;
  top: 50px;
  right: 24px;
  width: min(320px, calc(100vw - 320px));
  min-height: 82px;

  display: none;
  align-items: center;
  justify-content: center;

  padding: 12px 16px;
  border-radius: 16px;
  background: rgba(255,255,255,0.72);
  border: 1px solid rgba(7, 78, 41, 0.10);
  box-shadow: 0 10px 24px rgba(0,0,0,0.05);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.countdown-wrap.show{
  display: flex;
}

.countdown{
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.countdown-title{
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--title);
  text-align: center;
}

.countdown-values{
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
}

.countdown-item{
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.countdown-number{
  font-size: clamp(18px, 2.4vw, 32px);
  font-weight: 800;
  line-height: 1;
  color: #111;
  font-variant-numeric: tabular-nums;
}

.countdown-label{
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--title);
}
@media (max-width: 1100px){
  .countdown-wrap{
    width: min(390px, calc(100vw - 280px));
  }
}

@media (max-width: 900px){
  .countdown-wrap{
    position: static;
    width: 100%;
    max-width: 560px;
    min-height: auto;
    margin: 0 auto 12px;
  }

  .participants{
    position: static;
    left: auto;
    top: auto;
    transform: none;
    margin: 0 auto;
  }

  .bottom{
    position: static;
    left: auto;
    top: auto;
    transform: none;
    margin: 24px auto 0;
    width: fit-content;
  }
}


@media (max-width: 560px){
  .page{
    padding: 22px 14px 24px;
  }

  :root{
    --participant-size: 84px;
    --participant-gap: 12px;

    --day-size: 72px;
    --day-gap: 10px;
  }

  .participants{
    gap: var(--participant-gap);
  }

  .participant{
    width: var(--participant-size);
    gap: 6px;
  }

  .participant-photo{
    width: var(--participant-size);
    height: var(--participant-size);
    border-radius: 16px;
  }

  .participant-name{
    font-size: 13px;
  }

  .day-name{
    font-size: 12px;
    margin-bottom: 3px;
  }

  .day-date{
    font-size: 12px;
  }
}
.day-card{
  position: relative;
}

.day-stage{
  position: absolute;
  top: 10px;
  right: 12px;

  font-size: 14px;
  font-weight: 700;

  color: rgba(7,78,41,0.25);

  letter-spacing: 0.05em;
}
  .day-stats{
  margin-top:10px;
  font-size:14px;
  font-weight:600;
  color: rgba(30,42,34,0.55);
}
.day-stats span:last-child{
  opacity:0.8;
}

.day-weather{
  position:absolute;
  top:10px;
  left:10px;

  width:28px;
  height:28px;

  display:flex;
  align-items:center;
  justify-content:center;
}

.day-weather img{
  max-width:120%;
  max-height:120%;
  object-fit:contain;
  transform: translateY(1px);
}
.trip-summary{
  position: absolute;
  top: 360px;
  left: 50%;
  transform: translateX(-50%);

  width: min(500px, calc(100vw - 120px));
  padding: 16px 24px;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;

  border-radius: 18px;

  background: rgba(255,255,255,0.35);
  border: 1px solid rgba(7, 78, 41, 0.08);

  backdrop-filter: blur(6px);
}


.trip-summary-dates{
  font-size: 22px;
  font-weight: 800;
  color: var(--title);
  letter-spacing: 0.02em;
}


.trip-summary-meta{
  font-size: 16px;
  font-weight: 600;
  color: rgba(30,42,34,0.7);
}


.trip-summary-text{
  font-size: 14px;
  line-height: 1.4;
  color: rgba(30,42,34,0.62);
  text-align: center;
  max-width: 640px;
}
.trip-badge-logo{
  width: 185px;
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;

  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
}

.trip-badge-logo:hover{
  transform: translateY(-1px);
}

.trip-badge-logo:active{
  transform: translateY(1px);
}

.trip-badge-logo:focus-visible{
  outline: 2px solid rgba(7, 78, 41, 0.35);
  outline-offset: 6px;
  border-radius: 12px;
}

.day-card{
  cursor: pointer;
  transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
}

.day-card:hover{
  transform: translateY(-4px);
  box-shadow: 0 14px 28px rgba(0, 0, 0, 0.08);
  border-color: rgba(7, 78, 41, 0.18);
}

.day-card:active{
  transform: translateY(-1px);
}

.day-modal{
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  pointer-events: none;
}

.day-modal[aria-hidden="true"]{
  visibility: hidden;
}



.day-modal-backdrop{
  position: absolute;
  inset: 0;
  background: rgba(20, 27, 23, 0.22);
  opacity: 0;
  transition: opacity 0.28s ease;
}

.day-modal-dialog{
  position: relative;
  width: min(1020px, calc(100vw - 32px));
  height: min(85vh, 760px);
  max-height: 85vh;
  overflow: hidden;

  padding: 18px 20px 18px;
  border-radius: 22px;

  background: rgba(255,255,255,0.94);
  border: 1px solid rgba(7, 78, 41, 0.10);
  box-shadow: 0 22px 60px rgba(0,0,0,0.14);

  opacity: 0;
  transform: translateY(18px) scale(0.98);
  transition:
    opacity 0.28s ease,
    transform 0.30s ease;

  display: flex;
  flex-direction: column;
}

.day-modal.is-open{
  pointer-events: auto;
  visibility: visible;
}

.day-modal.is-open .day-modal-backdrop{
  opacity: 1;
}

.day-modal.is-open .day-modal-dialog{
  opacity: 1;
  transform: translateY(0) scale(1);
}

.day-modal-close{
  position: absolute;
  top: 12px;
  right: 12px;

  width: 38px;
  height: 38px;
  border: 0;
  border-radius: 12px;
  background: rgba(7, 78, 41, 0.06);
  color: var(--title);
  font-size: 26px;
  line-height: 1;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.2s ease;

  z-index: 20;
}

.day-modal-close:hover{
  background: rgba(7, 78, 41, 0.10);
  transform: scale(1.03);
}

.day-modal-topline{
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 6px;
  min-height: 28px;
}



.day-modal-topline-spacer{
  width: 100%;
  height: 42px;
}



.day-modal-meta{
  position: absolute;
  right: 60px;
  top: 2px;
  height: 24px;
  display: flex;
  align-items: center;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: rgba(7, 78, 41, 0.58);
  line-height: 1;
  white-space: nowrap;
  transform: none;

  pointer-events: none;
}

.day-modal-route-title{
  text-align: center;
  font-size: 24px;
  font-weight: 500;
  line-height: 1.15;
  color: var(--title);
  text-transform: uppercase;
  transform: none;
}


body.modal-open{
  overflow: hidden;
}

@media (max-width: 560px){
  .day-modal-dialog{
    padding: 22px 18px 18px;
    border-radius: 18px;
  }

  .day-modal-title{
    font-size: 22px;
  }

  .day-modal-date{
    font-size: 15px;
  }

  .day-modal-value{
    font-size: 15px;
  }
}

@media (max-height: 820px){
  .day-panel-map{
    height: clamp(200px, 28vh, 320px);
  }

  .day-panel-logistics{
    min-height: 180px;
  }
}

.day-modal-layout{
  display: grid;
  grid-template-columns: minmax(260px, 0.72fr) minmax(520px, 1.58fr);
  grid-template-areas:
    "logistics map"
    "summary   elevation";
  grid-template-rows:
    auto
    200px;

  gap: 10px;
  margin-top: 4px;

  flex: 1 1 auto;
  height: 100%;
  overflow: hidden;
}

.day-panel{
  border-radius: 22px;
  border: 1px solid rgba(7, 78, 41, 0.14);
  background: rgba(255,255,255,0.55);
  box-shadow: 0 8px 24px rgba(0,0,0,0.03);
}

.day-panel-summary{
  grid-area: summary;
  height: 200px;
  min-height: 200px;
  overflow: hidden;
}

.day-panel-logistics{
  grid-area: logistics;
  width: 100%;
  max-width: 360px;
  height: 350px;
  min-height: 350px;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-self: start;
}



.day-panel-map{
  grid-area: map;
  height: auto;
  min-height: 0;
  padding: 0;
  overflow: hidden;
  align-self: stretch;
}

.day-panel-elevation{
  grid-area: elevation;
  height: 200px;
  min-height: 200px;
  padding: 10px 12px 10px;
  overflow: hidden;
  position: relative;
  align-self: stretch;
}

.elevation-canvas{
  display: block;
  width: 100%;
  height: 100%;
  min-height: 140px;
}

.elevation-empty{
  position: absolute;
  inset: 10px 12px 10px 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  color: rgba(30,42,34,0.42);
  pointer-events: none;
}

.elevation-empty[hidden]{
  display: none !important;
}



.map-frame-wrap{
  width: 100%;
  height: 100%;
  border-radius: 22px;
  overflow: hidden;
}

.map-frame-wrap iframe{
  display: block;
  width: 100%;
  height: 100%;
  border: 0;
}

.map-embed{
  width: 100%;
  height: 100%;
}

.leaflet-map{
  width: 100%;
  height: 100%;
}

.leaflet-container{
  width: 100%;
  height: 100%;
  background: #e9efe8;
}

.day-panel-title{
  font-size: 18px;
  font-weight: 500;
  line-height: 1.2;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  color: rgba(239, 90, 76, 0.95);
  text-align: center;
  margin-top: 0;
}

.day-panel-title-map{
  margin-top: 120px;
}

.day-panel-subtitle{
  margin-top: 16px;
  max-width: 760px;
  margin-left: auto;
  margin-right: auto;

  font-size: 18px;
  line-height: 1.45;
  text-align: center;
  color: rgba(239, 90, 76, 0.95);
}

@media (max-width: 900px){
  .day-modal-layout{
  grid-template-columns: 1fr;
  grid-template-areas:
    "logistics"
    "map"
    "elevation"
    "summary";
  grid-template-rows: auto 320px 220px auto;
}

  .day-panel-map{
    grid-column: auto;
    height: 320px;
    min-height: 320px;
  }

  .day-panel-elevation{
    min-height: 220px;
  }
}

.summary-grid{
  --summary-tile-size: 84px;

  display: grid;
  grid-template-columns: repeat(3, var(--summary-tile-size));
  grid-template-rows: repeat(2, var(--summary-tile-size));

  column-gap: 5px;
  row-gap: 5px;

  width: 100%;
  height: 100%;

  padding: 11px 11px;

  justify-content: space-between;
  align-content: space-between;
  justify-items: stretch;
  align-items: stretch;
}

.summary-tile{
  width: 100%;
  height: 100%;

  border-radius: 16px;
  background: rgba(255,255,255,0.95);
  border: 1px solid rgba(7,78,41,0.14);
  box-shadow:
    0 6px 16px rgba(0,0,0,0.06),
    inset 0 1px 0 rgba(255,255,255,0.9);
}

/* ===== ОСОБЕННОСТИ ДНЯ ===== */

.logistics-grid{
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;

  width: 100%;
  flex: 1 1 auto;

  padding: 0;
  margin-top: 16px;

  align-content: space-evenly;
  justify-content: space-between;
}

.logistics-tile{
  width: 100%;
  aspect-ratio: 1 / 1;

  border-radius: 16px;

  background: rgba(255,255,255,0.95);
  border: 1px solid rgba(7,78,41,0.14);

  box-shadow:
    0 6px 16px rgba(0,0,0,0.06),
    inset 0 1px 0 rgba(255,255,255,0.9);
}




.summary-tile:hover{
  transform: translateY(-2px);
  box-shadow:
    0 10px 22px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.9);
}


.tile-content{
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100%;
  gap: 3px;
  padding: 6px;
}


.tile-title{
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: rgba(30,42,34,0.55);
}

.tile-value{
  font-size: 16px;
  font-weight: 700;
  color: var(--title);
  line-height: 1.1;
  white-space: nowrap;
}

.tile-content-stage{
  justify-content: center;
  align-items: center;
  gap: 10px;
  padding-top: 10px;
  padding-bottom: 10px;
}

.tile-stage-type{

function destroyLeafletMap() {
  if (activeLeafletMap) {
    activeLeafletMap.remove();
    activeLeafletMap = null;
  }

  activeLeafletTrack = null;
  activeLeafletMarker = null;
}

function clearMapContainer() {
  mapFramesCache.forEach((iframe) => {
    iframe.style.display = "none";
  });

  destroyLeafletMap();
  mapFrameWrap.innerHTML = "";
}

function showDayMap(dayKey, mapUrl, day = null) {
  clearMapContainer();

  if (mapMode === "iframe") {
    if (!mapUrl) {
      return;
    }

    if (mapFramesCache.has(dayKey)) {
      const existingIframe = mapFramesCache.get(dayKey);

      if (!mapFrameWrap.contains(existingIframe)) {
        mapFrameWrap.appendChild(existingIframe);
      }

      existingIframe.style.display = "block";
      return;
    }

    const iframe = document.createElement("iframe");
    iframe.src = mapUrl;
    iframe.title = "MapMagic route";
    iframe.frameBorder = "0";
    iframe.allowFullscreen = true;
    iframe.className = "map-embed";
    iframe.style.display = "block";

    mapFrameWrap.appendChild(iframe);
    mapFramesCache.set(dayKey, iframe);
    return;
  }

  if (mapMode === "leaflet") {
    initLeafletMap(day);
  }
}

function buildIsoDate(dayDate, tripYear) {
  const [dd, mm] = String(dayDate).split(".");
  return `${tripYear}-${mm}-${dd}`;
}

function formatTemp(value) {
  if (value === null || value === undefined || Number.isNaN(value)) return null;
  const rounded = Math.round(Number(value));
  return `${rounded >= 0 ? "+" : ""}${rounded}`;
}

function weatherCodeToIcon(code) {
  if (code === 0 || code === 1) return "sun.png";
  if (code === 2) return "cloudsun.png";
  if (code === 3 || code === 45 || code === 48) return "cloud.png";

  // лёгкий дождь / морось
  if ([51, 53, 56, 61, 80].includes(code)) return "rainsun.png";

  // обычный дождь
  if ([55, 57, 63, 65, 66, 67, 81, 82].includes(code)) return "rain.png";

  if ([95, 96, 99].includes(code)) return "thinder.png";

  return "cloudsun.png";
}

async function getWeatherPoint(lat, lon, targetDate, placeName) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const selectedDate = new Date(targetDate + "T00:00:00");
  selectedDate.setHours(0, 0, 0, 0);

  const diffDays = Math.round(
    (selectedDate - today) / (1000 * 60 * 60 * 24)
  );

  // 1. Прошлое -> архив фактической погоды
  if (diffDays < 0) {
    const archiveUrl =
      `https://archive-api.open-meteo.com/v1/archive` +
      `?latitude=${encodeURIComponent(lat)}` +
      `&longitude=${encodeURIComponent(lon)}` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
      `&timezone=auto` +
      `&start_date=${encodeURIComponent(targetDate)}` +
      `&end_date=${encodeURIComponent(targetDate)}`;

    const response = await fetch(archiveUrl);
    if (!response.ok) throw new Error("Не удалось получить архивную погоду.");

    const data = await response.json();

    return {
      mode: "archive",
      place: placeName,
      date: targetDate,
      weatherCode: data.daily?.weather_code?.[0] ?? null,
      tMax: data.daily?.temperature_2m_max?.[0] ?? null,
      tMin: data.daily?.temperature_2m_min?.[0] ?? null
    };
  }

  // 2. Ближайшее будущее -> обычный прогноз
  if (diffDays >= 0 && diffDays <= 16) {
    const forecastUrl =
      `https://api.open-meteo.com/v1/forecast` +
      `?latitude=${encodeURIComponent(lat)}` +
      `&longitude=${encodeURIComponent(lon)}` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
      `&timezone=auto` +
      `&start_date=${encodeURIComponent(targetDate)}` +
      `&end_date=${encodeURIComponent(targetDate)}`;

    const response = await fetch(forecastUrl);
    if (!response.ok) throw new Error("Не удалось получить прогноз.");

    const data = await response.json();

    return {
      mode: "forecast",
      place: placeName,
      date: targetDate,
      weatherCode: data.daily?.weather_code?.[0] ?? null,
      tMax: data.daily?.temperature_2m_max?.[0] ?? null,
      tMin: data.daily?.temperature_2m_min?.[0] ?? null
    };
  }

  // 3. Далёкое будущее -> климатическая оценка
  const climateUrl =
    `https://climate-api.open-meteo.com/v1/climate` +
    `?latitude=${encodeURIComponent(lat)}` +
    `&longitude=${encodeURIComponent(lon)}` +
    `&start_date=${encodeURIComponent(targetDate)}` +
    `&end_date=${encodeURIComponent(targetDate)}` +
    `&models=CMCC_CM2_VHR4` +
    `&daily=temperature_2m_max,temperature_2m_min` +
    `&timezone=auto`;

  const response = await fetch(climateUrl);
  if (!response.ok) throw new Error("Не удалось получить климатическую оценку.");

  const data = await response.json();

  return {
    mode: "climate",
    place: placeName,
    date: targetDate,
    weatherCode: null,
    tMax: data.daily?.temperature_2m_max?.[0] ?? null,
    tMin: data.daily?.temperature_2m_min?.[0] ?? null
  };
}

async function resolveDayWeather(day, tripYear) {
  if (!day?.weatherPoints?.morning || !day?.weatherPoints?.day) return null;

  const morningPoint = day.weatherPoints.morning;
  const dayPoint = day.weatherPoints.day;

  if (
  morningPoint.lat == null || morningPoint.lon == null ||
  dayPoint.lat == null || dayPoint.lon == null
) {
  return null;
}

  if (day.weatherFetched) {
    return day.weatherFetched;
  }

  const isoDate = buildIsoDate(day.date, tripYear);

  try {
    const [morningResult, dayResult] = await Promise.all([
      getWeatherPoint(
        morningPoint.lat,
        morningPoint.lon,
        isoDate,
        morningPoint.name || "Утро"
      ),
      getWeatherPoint(
        dayPoint.lat,
        dayPoint.lon,
        isoDate,
        dayPoint.name || "День"
      )
    ]);

    const merged = {
      morning: morningResult,
      day: dayResult
    };

    day.weatherFetched = merged;

    day.tempMorning = formatTemp(morningResult?.tMin ?? morningResult?.tMax);
    day.tempDay = formatTemp(dayResult?.tMax ?? dayResult?.tMin);

    if (dayResult?.weatherCode !== null && dayResult?.weatherCode !== undefined) {
      day.weather = weatherCodeToIcon(dayResult.weatherCode);
    } else if (morningResult?.weatherCode !== null && morningResult?.weatherCode !== undefined) {
      day.weather = weatherCodeToIcon(morningResult.weatherCode);
    }

    return merged;
  } catch (error) {
    console.error("Ошибка получения погоды:", error);
    return null;
  }
}

async function loadTextFile(url) {
  const response = await fetch(url);

  if (!response.ok) {
    throw new Error(`Не удалось загрузить файл: ${url} (HTTP ${response.status})`);
  }

  return await response.text();
}

function parseTrackPoint(pt) {
  const lat = Number(pt.getAttribute("lat"));
  const lon = Number(pt.getAttribute("lon"));

  if (Number.isNaN(lat) || Number.isNaN(lon)) {
    return null;
  }

  const eleNode = pt.querySelector(":scope > ele");
  const timeNode = pt.querySelector(":scope > time");

  const hrNode =
    pt.querySelector("extensions TrackPointExtension hr") ||
    pt.querySelector("extensions hr");

  const tempNode =
    pt.querySelector("extensions TrackPointExtension atemp") ||
    pt.querySelector("extensions atemp");

  const ele = eleNode ? Number(eleNode.textContent) : null;
  const time = timeNode ? timeNode.textContent.trim() : null;
  const hr = hrNode ? Number(hrNode.textContent) : null;
  const atemp = tempNode ? Number(tempNode.textContent) : null;

  return {
    lat,
    lon,
    ele: Number.isNaN(ele) ? null : ele,
    time,
    hr: Number.isNaN(hr) ? null : hr,
    atemp: Number.isNaN(atemp) ? null : atemp
  };
}

function parseGpx(xmlText) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, "application/xml");

  const parserError = xml.querySelector("parsererror");
  if (parserError) {
    throw new Error("Ошибка разбора GPX.");
  }

  const trksegNodes = Array.from(xml.querySelectorAll("trkseg"));

  const segments = trksegNodes.map((segNode, segIndex) => {
    const points = Array.from(segNode.querySelectorAll("trkpt"))
      .map(parseTrackPoint)
      .filter(Boolean);

    return {
      index: segIndex,
      points
    };
  }).filter(seg => seg.points.length > 0);

  const allPoints = segments.flatMap(seg => seg.points);

  return {
    segments,
    points: allPoints
  };
}

function getDistanceMeters(a, b) {
  const R = 6371000;
  const toRad = (deg) => deg * Math.PI / 180;

  const dLat = toRad(b.lat - a.lat);
  const dLon = toRad(b.lon - a.lon);
  const lat1 = toRad(a.lat);
  const lat2 = toRad(b.lat);

  const sinLat = Math.sin(dLat / 2);
  const sinLon = Math.sin(dLon / 2);

  const h =
    sinLat * sinLat +
    Math.cos(lat1) * Math.cos(lat2) * sinLon * sinLon;

  return 2 * R * Math.asin(Math.sqrt(h));
}

function summarizePoints(points) {
  if (!Array.isArray(points) || points.length < 2) {
    return {
      pointCount: Array.isArray(points) ? points.length : 0,
      distanceKm: 0,
      climb: 0,
      down: 0,
      minElevation: null,
      maxElevation: null,
      start: points?.[0] || null,
      mid: points?.[0] || null,
      finish: points?.[points.length - 1] || null,
      hasElevation: false,
      hasTime: false,
      hasHeartRate: false,
      hasTemperature: false,
      startTimeUtc: points?.find(p => p.time)?.time || null,
      finishTimeUtc: [...(points || [])].reverse().find(p => p.time)?.time || null
    };
  }

  let distance = 0;
  let climb = 0;
  let down = 0;

  const elevations = [];
  const hrs = [];
  const temps = [];
  let hasTime = false;

  for (let i = 0; i < points.length; i++) {
    const p = points[i];

    if (p.ele !== null) elevations.push(p.ele);
    if (p.hr !== null) hrs.push(p.hr);
    if (p.atemp !== null) temps.push(p.atemp);
    if (p.time) hasTime = true;

    if (i === 0) continue;

    const prev = points[i - 1];
    const curr = points[i];

    distance += getDistanceMeters(prev, curr);

    if (prev.ele !== null && curr.ele !== null) {
      const diff = curr.ele - prev.ele;
      if (diff > 0) climb += diff;
      if (diff < 0) down += Math.abs(diff);
    }
  }

  const middleIndex = Math.floor(points.length / 2);

  const firstTimed = points.find(p => p.time) || null;
  const lastTimed = [...points].reverse().find(p => p.time) || null;

  return {
    pointCount: points.length,
    distanceKm: Math.round((distance / 1000) * 10) / 10,
    climb: Math.round(climb),
    down: Math.round(down),
    minElevation: elevations.length ? Math.round(Math.min(...elevations)) : null,
    maxElevation: elevations.length ? Math.round(Math.max(...elevations)) : null,
    start: points[0],
    mid: points[middleIndex],
    finish: points[points.length - 1],
    hasElevation: elevations.length > 0,
    hasTime,
    hasHeartRate: hrs.length > 0,
    hasTemperature: temps.length > 0,
    startTimeUtc: firstTimed?.time || null,
    finishTimeUtc: lastTimed?.time || null
  };
}

function summarizeSegments(segments) {
  const segmentSummaries = segments.map((segment) => ({
    ...segment,
    summary: summarizePoints(segment.points)
  }));

  const allPoints = segmentSummaries.flatMap(seg => seg.points);
  const summary = summarizePoints(allPoints);

  summary.segmentCount = segmentSummaries.length;

  return {
    segments: segmentSummaries,
    summary
  };
}

async function loadSingleGpxTrack(track) {
  const xmlText = await loadTextFile(track.file);
  const parsed = parseGpx(xmlText);
  const summarized = summarizeSegments(parsed.segments);

  return {
    ...track,
    points: parsed.points,
    ...summarized
  };
}

function buildElevationProfileFromTracks(tracks = []) {
  if (!Array.isArray(tracks) || !tracks.length) return [];

  let totalDistance = 0;
  const profile = [];
  let previousPoint = null;

  tracks.forEach((track, trackIndex) => {
    const points = Array.isArray(track?.points)
      ? track.points
      : Array.isArray(track?.segments)
        ? track.segments.flatMap(segment => segment.points || [])
        : [];

    if (!points.length) return;

    points.forEach((point, i) => {
      const elevation = Number(point?.ele);
      if (!Number.isFinite(elevation)) return;

      if (previousPoint) {
        totalDistance += getDistanceMeters(previousPoint, point);
      }

      profile.push({
  distance: totalDistance / 1000,
  ele: elevation,
  lat: Number(point.lat),
  lon: Number(point.lon),
  isBreak: false
});

      previousPoint = point;
    });

    // 👉 добавляем маркер разрыва (между сегментами)
    if (trackIndex < tracks.length - 1) {
      profile.push({
  distance: totalDistance / 1000,
  ele: null,
  lat: null,
  lon: null,
  isBreak: true
});
      previousPoint = null;
    }
  });

  return profile.length >= 2 ? profile : [];
}

async function loadDayGpx(day) {
  if (!day || !Array.isArray(day.gpxTracks) || !day.gpxTracks.length) {
    return null;
  }

  if (!day.gpxData || typeof day.gpxData !== "object") {
    day.gpxData = {
      planned: null,
      actual: null
    };
  }

  const plannedTracks = day.gpxTracks.filter(track => track.kind === "planned");
  const actualTracks = day.gpxTracks.filter(track => track.kind === "actual");

  async function loadTracksSafe(tracks, label) {
    const results = await Promise.allSettled(
      tracks.map(loadSingleGpxTrack)
    );

    const success = [];
    const failed = [];

    results.forEach((result, index) => {
      const track = tracks[index];

      if (result.status === "fulfilled") {
        success.push(result.value);
      } else {
        failed.push({
          track,
          error: result.reason
        });
      }
    });

    if (failed.length) {
      console.warn(`Не удалось загрузить ${label} GPX:`, failed);
    }

    return success;
  }

  if (day.gpxData.planned === null && plannedTracks.length) {
    day.gpxData.planned = await loadTracksSafe(plannedTracks, "planned");
  }

  if (day.gpxData.actual === null && actualTracks.length) {
    day.gpxData.actual = await loadTracksSafe(actualTracks, "actual");
  }

  return day.gpxData;
}

function buildElevationProfileFromTrack(points = []) {
  if (!Array.isArray(points) || points.length < 2) return [];

  const toRad = (deg) => deg * Math.PI / 180;

  const distanceMeters = (a, b) => {
    const R = 6371000;
    const dLat = toRad((b.lat || 0) - (a.lat || 0));
    const dLon = toRad((b.lon || 0) - (a.lon || 0));
    const lat1 = toRad(a.lat || 0);
    const lat2 = toRad(b.lat || 0);

    const s =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.sin(dLon / 2) * Math.sin(dLon / 2) * Math.cos(lat1) * Math.cos(lat2);

    return 2 * R * Math.asin(Math.sqrt(s));
  };

  let total = 0;

  const profile = [{
    distance: 0,
    ele: Number(points[0].ele) || 0
  }];

  for (let i = 1; i < points.length; i++) {
    total += distanceMeters(points[i - 1], points[i]);

    profile.push({
      distance: total / 1000,
      ele: Number(points[i].ele) || 0
    });
  }

  return profile;
}

function smoothElevationProfile(profile, stepKm = 0.1) {
  if (!Array.isArray(profile) || profile.length < 2) return profile;

  const result = [];

  let currentIndex = 0;
  const maxDistance = profile[profile.length - 1].distance;

  for (let d = 0; d <= maxDistance; d += stepKm) {
    while (
      currentIndex < profile.length - 1 &&
      profile[currentIndex + 1].distance < d
    ) {
      currentIndex++;
    }

    const p1 = profile[currentIndex];
    const p2 = profile[currentIndex + 1];

    if (!p2 || p1.isBreak || p2.isBreak) {
  result.push({
    distance: d,
    ele: p1.ele,
    lat: p1.lat ?? null,
    lon: p1.lon ?? null,
    isBreak: !!p1.isBreak
  });
  continue;
}

const t =
  (d - p1.distance) / (p2.distance - p1.distance || 1);

const ele = p1.ele + (p2.ele - p1.ele) * t;

const lat =
  Number.isFinite(p1.lat) && Number.isFinite(p2.lat)
    ? p1.lat + (p2.lat - p1.lat) * t
    : null;

const lon =
  Number.isFinite(p1.lon) && Number.isFinite(p2.lon)
    ? p1.lon + (p2.lon - p1.lon) * t
    : null;

result.push({
  distance: d,
  ele,
  lat,
  lon,
  isBreak: false
});
  }

  return result;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function findNearestProfilePoint(profile, distanceKm) {
  if (!Array.isArray(profile) || !profile.length) return null;

  let nearest = null;
  let minDiff = Infinity;

  for (const point of profile) {
    if (!point || point.isBreak || !Number.isFinite(point.ele)) continue;

    const diff = Math.abs(point.distance - distanceKm);
    if (diff < minDiff) {
      minDiff = diff;
      nearest = point;
    }
  }

  return nearest;
}

function updateLeafletMarkerFromProfilePoint(point) {
  if (!activeLeafletMarker || !point) return;
  if (!Number.isFinite(point.lat) || !Number.isFinite(point.lon)) return;

  activeLeafletMarker.setLatLng([point.lat, point.lon]);
}

function getProfileSlopePercent(profile, point) {
  if (!Array.isArray(profile) || !profile.length || !point) return 0;

  const index = profile.findIndex(
    p => !p.isBreak && p.distance === point.distance && p.ele === point.ele
  );

  if (index === -1) return 0;

  let prev = null;
  let next = null;

  for (let i = index - 1; i >= 0; i--) {
    if (!profile[i]?.isBreak && Number.isFinite(profile[i]?.ele)) {
      prev = profile[i];
      break;
    }
  }

  for (let i = index + 1; i < profile.length; i++) {
    if (!profile[i]?.isBreak && Number.isFinite(profile[i]?.ele)) {
      next = profile[i];
      break;
    }
  }

  if (!prev || !next) return 0;

  const deltaEle = next.ele - prev.ele;
  const deltaDistMeters = (next.distance - prev.distance) * 1000;

  if (!deltaDistMeters) return 0;

  return (deltaEle / deltaDistMeters) * 100;
}

function updateElevationHover(event) {
  const canvas = elevationCanvas;
  if (!canvas || !Array.isArray(currentElevationProfile) || currentElevationProfile.length < 2) {
    return;
  }

  const rect = canvas.getBoundingClientRect();
  const cssWidth = canvas.clientWidth || rect.width || 600;
  const cssHeight = canvas.clientHeight || rect.height || 190;

  const pad = { top: 16, right: 18, bottom: 30, left: 46 };
  const w = cssWidth - pad.left - pad.right;

  const mouseX = event.clientX - rect.left;
  const clampedX = clamp(mouseX, pad.left, pad.left + w);

  const validPoints = currentElevationProfile.filter(
    point => !point.isBreak && Number.isFinite(point.ele)
  );

  if (!validPoints.length) return;

  const minX = validPoints[0].distance;
  const maxX = validPoints[validPoints.length - 1].distance;

  const distanceKm = minX + ((clampedX - pad.left) / (w || 1)) * (maxX - minX);
  const nearestPoint = findNearestProfilePoint(validPoints, distanceKm);

  if (!nearestPoint) return;

  const slope = getProfileSlopePercent(validPoints, nearestPoint);

elevationHoverState = {
  distance: nearestPoint.distance,
  ele: nearestPoint.ele,
  slope
};

updateLeafletMarkerFromProfilePoint(nearestPoint);
drawElevationProfile(currentElevationProfile);
}

function clearElevationHover() {
  elevationHoverState = null;

  const firstPoint = Array.isArray(currentElevationProfile)
    ? currentElevationProfile.find(
        point =>
          !point?.isBreak &&
          Number.isFinite(point?.lat) &&
          Number.isFinite(point?.lon)
      )
    : null;

  if (firstPoint) {
    updateLeafletMarkerFromProfilePoint(firstPoint);
  }

  drawElevationProfile(currentElevationProfile);
}

function drawElevationProfile(profile = []) {
  const canvas = elevationCanvas;
  if (!canvas) return;

  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const cssWidth = canvas.clientWidth || 600;
  const cssHeight = canvas.clientHeight || 190;

  canvas.width = Math.round(cssWidth * dpr);
  canvas.height = Math.round(cssHeight * dpr);

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cssWidth, cssHeight);

  if (!Array.isArray(profile) || profile.length < 2) {
    if (elevationEmpty) elevationEmpty.hidden = false;
    return;
  }

  if (elevationEmpty) elevationEmpty.hidden = true;

  const pad = { top: 16, right: 18, bottom: 30, left: 46 };
  const w = cssWidth - pad.left - pad.right;
  const h = cssHeight - pad.top - pad.bottom;

  const distances = profile.map(point => Number(point.distance) || 0);
  const elevations = profile.map(point => Number(point.ele) || 0);

  const minX = Math.min(...distances);
  const maxX = Math.max(...distances);

  let minY = Math.min(...elevations);
  let maxY = Math.max(...elevations);

  if (minY === maxY) {
    minY -= 10;
    maxY += 10;
  }

  const yPadding = Math.max(10, (maxY - minY) * 0.10);
  minY -= yPadding;
  maxY += yPadding;

  const xToPx = (x) => pad.left + ((x - minX) / (maxX - minX || 1)) * w;
  const yToPx = (y) => pad.top + h - ((y - minY) / (maxY - minY || 1)) * h;

  ctx.strokeStyle = "rgba(30,42,34,0.10)";
  ctx.lineWidth = 1;

  const yGridCount = 5;
  for (let i = 0; i <= yGridCount; i++) {
    const y = pad.top + (h / yGridCount) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + w, y);
    ctx.stroke();
  }
  // 👉 рисуем разрывы (пунктирные вертикальные линии)
ctx.setLineDash([4, 4]);
ctx.strokeStyle = "rgba(120,120,120,0.6)";

profile.forEach(point => {

let started = false;

profile.forEach((point) => {

    ctx.lineWidth = 1;
    ctx.moveTo(hoverX, pad.top);
    ctx.lineTo(hoverX, pad.top + h);
    ctx.stroke();

const tooltipLines = [
  `${elevationHoverState.distance.toFixed(1)} км`,
  `${Math.round(elevationHoverState.ele)} м`,
  `${Math.round(elevationHoverState.slope)} %`
];

ctx.font = "12px Arial";
ctx.textAlign = "left";
ctx.textBaseline = "top";

const lineHeight = 18;
const textPadX = 2;
const textPadY = 1;

let textX = hoverX + 10;
const textY = pad.top + 6;

const maxTextWidth = Math.max(...tooltipLines.map(line => ctx.measureText(line).width));

if (textX + maxTextWidth + textPadX * 2 > pad.left + w) {
  textX = hoverX - maxTextWidth - textPadX * 2 - 10;
}

if (textX < pad.left + 4) {
  textX = pad.left + 4;
}

tooltipLines.forEach((line, index) => {
  const y = textY + index * lineHeight;
  const metrics = ctx.measureText(line);
  const textWidth = metrics.width;

  // белая локальная подложка только под текстом
// тонкая подложка с мягкими краями
ctx.fillStyle = "rgba(255,255,255,0.75)"; // прозрачность регулируется тут
ctx.beginPath();
ctx.roundRect(
  textX - textPadX,
  y - textPadY,
  textWidth + textPadX * 2,
  10 + textPadY * 2,
  3 // радиус скругления
);
ctx.fill();

// сам текст
ctx.fillStyle = "#111";
ctx.fillText(line, textX, y);
});

    ctx.restore();
  }
}

function closeDayModal() {
  dayModal.setAttribute("aria-hidden", "true");
  dayModal.classList.remove("is-open");
  document.body.classList.remove("modal-open");

  checkRouteEasterEggProgress();
  routeCurrentOpenedIndex = null;
}

function checkRouteEasterEggProgress() {
  if (activeTrip !== "2024") return;
  if (easterEggActivated) return;
  if (routeCurrentOpenedIndex === null) return;

  const trip = trips[activeTrip];
  const totalDays = trip?.days?.length || 0;

  if (routeCurrentOpenedIndex === routeProgressIndex) {
    routeProgressIndex += 1;

    if (routeProgressIndex >= totalDays) {
      activateParticipantsEasterEgg();
    }

    return;
  }

  if (routeCurrentOpenedIndex === 0) {
    routeProgressIndex = 1;
    return;
  }

  routeProgressIndex = 0;
}

function activateParticipantsEasterEgg() {
  if (activeTrip !== "2024") return;

  easterEggActivated = true;
  participantsUnlocked2024 = true;

  const participants = participantsEl.querySelectorAll(".participant img");

  participants.forEach((img, index) => {
    img.src = `./image/people/easter-${index + 1}.png`;
  });
}

function resetParticipantsHug2024() {
  participantClicks2024.clear();
  participantsHugActivated2024 = false;
  participantsUnlocked2024 = false;

  participantsEl.classList.remove("hug-ready");
}

function handleParticipantClick(participantIndex) {
  if (activeTrip !== "2024") return;
  if (!participantsUnlocked2024) return;
  if (participantsHugActivated2024) return;

  participantClicks2024.add(participantIndex);

  const totalParticipants = trips["2024"]?.participants?.length || 0;

if (participantClicks2024.size >= totalParticipants) {
  participantsHugActivated2024 = true;
  participantsEl.classList.add("hug-ready");

  // ⬇️ НОВОЕ: через паузу возвращаем обычные иконки

    const originalParticipants = trips["2024"].participants;

    participants.forEach((img, index) => {
      img.src = originalParticipants[index].img;
    });
  }, 1200); // можно 800–1500 под вкус
}
}

function pad(value) {
  return String(value).padStart(2, "0");
}

function stopCountdown() {
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
}

function resetCountdownView() {
  cdDays.textContent = "000";
  cdHours.textContent = "00";
  cdMinutes.textContent = "00";
  cdSeconds.textContent = "00";
  countdownWrap.classList.remove("show");
}

function startCountdown(targetDateString) {
  stopCountdown();

  if (!targetDateString) {
    resetCountdownView();
    return;
  }

  countdownWrap.classList.add("show");
  const targetDate = new Date(targetDateString);

  function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      cdDays.textContent = "0";
      cdHours.textContent = "00";
      cdMinutes.textContent = "00";
      cdSeconds.textContent = "00";
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);
    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    cdDays.textContent = String(days);
    cdHours.textContent = pad(hours);
    cdMinutes.textContent = pad(minutes);
    cdSeconds.textContent = pad(seconds);
  }

  updateCountdown();
  countdownInterval = setInterval(updateCountdown, 1000);
}

function formatNumber(value) {
  return new Intl.NumberFormat("ru-RU").format(value);
}

function pluralizeParticipants(count) {
  const mod10 = count % 10;
  const mod100 = count % 100;

  if (mod100 >= 11 && mod100 <= 14) return "участников";
  if (mod10 === 1) return "участник";
  if (mod10 >= 2 && mod10 <= 4) return "участника";
  return "участников";
}

function getTripSummary(trip) {
  const days = Array.isArray(trip.days) ? trip.days : [];
  const participantsCount = Array.isArray(trip.participants) ? trip.participants.length : 0;

  const firstDate = days[0]?.date || "";
  const lastDate = days[days.length - 1]?.date || "";

  const totalKm = days.reduce((sum, day) => {
    return sum + (Number(day.km) || 0);
  }, 0);

  const totalClimb = days.reduce((sum, day) => {
    return sum + (Number(day.climb) || 0);
  }, 0);

  const hasRouteData = days.some(day => day.km !== undefined || day.climb !== undefined);

  const dates =
    firstDate && lastDate
      ? `${firstDate} — ${lastDate}`
      : trip.summary?.dates || "";

  let meta = `${days.length} этапов`;

  if (hasRouteData) {
    meta += ` · ${formatNumber(totalKm)} км · +${formatNumber(totalClimb)} м`;
  } else {
    meta += ` · маршрут формируется`;
  }

  meta += ` · ${participantsCount} ${pluralizeParticipants(participantsCount)}`;

  return {
    dates,
    meta,
    text: trip.summary?.text || ""
  };
}

function buildDayCard(day, index) {
  const weatherHtml = day.weather
    ? `
      <div class="day-weather">
        <img src="./image/weather/${day.weather}" alt="">
      </div>
    `
    : "";

  const statsHtml = (day.km !== undefined || day.climb !== undefined)
    ? `
      <div class="day-stats">
        <span>${day.km ?? "—"} км</span>
        <span>↗ ${day.climb ?? "—"}</span>
      </div>
    `
    : "";

  const el = document.createElement("article");
  el.className = "day-card";
  el.dataset.dayIndex = String(index);

  el.innerHTML = `
    <div class="day-stage">${index + 1}</div>
    ${weatherHtml}
    <div class="day-name">${day.name}</div>
    <div class="day-date">${day.date}</div>
    ${statsHtml}
  `;

  el.addEventListener("click", () => {
    openDayModal(day, index);
  });

  return el;
}

function refreshDayCard(day, index) {
  const oldCard = daysEl.querySelector(`.day-card[data-day-index="${index}"]`);
  if (!oldCard) return;

  const newCard = buildDayCard(day, index);
  oldCard.replaceWith(newCard);
}

function renderTrip(year) {
  const trip = trips[year];
  if (!trip) return;

  activeTrip = year;
  tripToggleState = year;
  badgeYear.textContent = activeTrip;

  routeProgressIndex = 0;
  routeCurrentOpenedIndex = null;
  easterEggActivated = false;

  resetParticipantsHug2024();

  const computedSummary = getTripSummary(trip);

  tripDatesEl.textContent = computedSummary.dates;
  tripMetaEl.textContent = computedSummary.meta;
  tripTextEl.textContent = computedSummary.text;

  document.documentElement.style.setProperty("--participants-count", trip.participants.length);
  document.documentElement.style.setProperty("--days-count", trip.days.length);

  participantsEl.innerHTML = "";
  daysEl.innerHTML = "";

  trip.participants.forEach((p, index) => {
  const el = document.createElement("article");
  el.className = "participant";
  el.innerHTML = `
    <div class="participant-photo">
      <img src="${p.img}" alt="${p.name}">
    </div>
    <div class="participant-name">${p.name}</div>
  `;

  el.addEventListener("click", () => {
    handleParticipantClick(index);
  });

  participantsEl.appendChild(el);
});

  trip.days.forEach((d, i) => {
    daysEl.appendChild(buildDayCard(d, i));
  });

  startCountdown(trip.raceDate);
}

function toggleTrip() {
  if (tripToggleState === "2026") {
    tripToggleState = "2025";
    badgeYear.textContent = "2025";
    return;
  }

  if (tripToggleState === "2025") {
    tripToggleState = "2024";
    renderTrip("2024");
    return;
  }

  tripToggleState = "2026";
  renderTrip("2026");
}

function toLocalTime(utcString) {
  if (!utcString) return null;

  const date = new Date(utcString);

  return date.toLocaleTimeString("ru-RU", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

function getStatisticTracks(day) {
  const actualTracks = Array.isArray(day?.gpxData?.actual)
    ? day.gpxData.actual.filter(track => track?.summary)
    : [];

  if (actualTracks.length) {
    return actualTracks;
  }

  const plannedTracks = Array.isArray(day?.gpxData?.planned)
    ? day.gpxData.planned.filter(track => track?.summary)
    : [];

  return plannedTracks;
}

function summarizeTrackCollection(tracks) {
  if (!Array.isArray(tracks) || !tracks.length) {
    return null;
  }

  let distanceKm = 0;
  let climb = 0;
  let down = 0;
  let maxElevation = null;

  for (const track of tracks) {
    const summary = track?.summary;
    if (!summary) continue;

    distanceKm += Number(summary.distanceKm) || 0;
    climb += Number(summary.climb) || 0;
    down += Number(summary.down) || 0;

    if (summary.maxElevation !== null && summary.maxElevation !== undefined) {
      maxElevation =
        maxElevation === null
          ? Number(summary.maxElevation)
          : Math.max(maxElevation, Number(summary.maxElevation));
    }
  }

  return {
    distanceKm: Math.round(distanceKm * 10) / 10,
    climb: Math.round(climb),
    down: Math.round(down),
    maxElevation: maxElevation !== null ? Math.round(maxElevation) : null
  };
}

const loginOverlay = document.getElementById("loginOverlay");
const loginForm = document.getElementById("loginForm");
const passwordInput = document.getElementById("passwordInput");
const togglePassword = document.getElementById("togglePassword");

const allowedUsers = [
  { login: "admin", password: "234455" }
];

let preloadPromise = null;

function startInitialPreload() {
  if (!preloadPromise) {
    preloadPromise = Promise.allSettled([
      preloadTripDays("2024"),
      preloadTripDays("2026")
    ]);
  }
  return preloadPromise;
}


function showLoginOverlay() {
  loginOverlay.classList.add("is-visible");
  loginOverlay.setAttribute("aria-hidden", "false");
  document.body.classList.add("auth-locked");
}

function hideLoginOverlay() {
  loginOverlay.classList.remove("is-visible");
  loginOverlay.setAttribute("aria-hidden", "true");
  document.body.classList.remove("auth-locked");
}


togglePassword.addEventListener("click", () => {
  const isPassword = passwordInput.type === "password";
  passwordInput.type = isPassword ? "text" : "password";
  togglePassword.setAttribute(
    "aria-label",
    isPassword ? "Скрыть пароль" : "Показать пароль"
  );
});

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const login = loginForm.login.value;
  const password = loginForm.password.value;

  const user = allowedUsers.find(u =>
    u.login === login && u.password === password
  );

  if (!user) {
    alert("Неверный логин или пароль");
    return;
  }

  sessionStorage.setItem("auth", "true");

  try {
    await startInitialPreload();
  } catch (error) {
    console.error("Ошибка предзагрузки:", error);
  }

  renderTrip(activeTrip);
  hideLoginOverlay();
});



async function preloadTripDays(tripYear) {
  const trip = trips[tripYear];
  if (!trip || !Array.isArray(trip.days)) return;

  await Promise.allSettled(
    trip.days.map(async (day, index) => {
      await loadDayGpx(day);
      applyDayDataFromGpx(day);
      await resolveDayWeather(day, tripYear);
      refreshDayCard(day, index);
    })
  );
}
