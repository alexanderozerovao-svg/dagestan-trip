<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <style>
    @font-face {
      font-family: 'DagestanCustom';
      src: url('./DagestaN%20.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root{
  --bg: #f6f6f4;
  --title: #074e29;
  --text: #1e2a22;
  --muted: rgba(30, 42, 34, 0.66);
  --card: rgba(255, 255, 255, 0.68);
  --card-border: rgba(7, 78, 41, 0.10);
  --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
  --day-bg: rgba(255, 255, 255, 0.72);
  --day-border: rgba(7, 78, 41, 0.12);

  --participant-size: 100px;
  --participant-gap: 20px;

  --day-size: 140px;
  --day-gap: 12px;
}

    *{
      box-sizing: border-box;
    }

    html,
    body{
      margin: 0;
      min-height: 100%;
    }

    body{
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    body::after{
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: min(260px, 32vh);
      background: var(--bg-image) bottom center / cover no-repeat;
      opacity: 0.9;
      pointer-events: none;
      z-index: -2;
    }

    body::before{
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: min(320px, 40vh);
      background: linear-gradient(
        to top,
        rgba(246, 246, 244, 0) 0%,
        rgba(246, 246, 244, 0.72) 48%,
        rgba(246, 246, 244, 1) 100%
      );
      pointer-events: none;
      z-index: -1;
    }

    .page{
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 28px 24px 34px;
      position: relative;
      z-index: 1;
    }

    .top{
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .title{
  margin: 0;
  font-family: 'DagestanCustom', serif;
  font-size: clamp(30px, 7vw, 90px);
  font-weight: 400;
  line-height: 1;
  letter-spacing: 0.03em;
  color: var(--title);
  text-transform: uppercase;
  text-align: center;

  max-width: calc(100% - 260px);
}
.trip-badge{
  position: absolute;

  top: 10px;      /* выше */
  left: 40px;     /* теперь слева */

  width: 200px;

  display: flex;
  flex-direction: column;
  align-items: center;

  z-index: 5;
}

.trip-badge-year{
  position: absolute;
  top: 30px;
  right: -60px;

  font-family: 'DagestanCustom', serif;
  font-size: 28px;
  font-weight: 400;
width: 200px;
  letter-spacing: 0.05em;
  color: #074e29;
display: flex;
  flex-direction: column;
  align-items: center;
  transform: rotate(0deg) translate(0,-5px);
text-shadow: 0 3px 6px rgba(0,0,0,0.15);
  z-index: 5;
}

.trip-badge-logo{
  width: 185px;
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.trip-badge-logo img{
  max-width: 100%;
  max-height: 100%;
  display: block;
  object-fit: contain;
}

.trip-badge-name{
  position: relative;

  top: -8px;      /* вниз / вверх */
  left: 0px;     /* вправо / влево */

  margin-top: 0;

  font-family: 'DagestanCustom', serif;
  font-size: 38px;
  line-height: 0.95;
  letter-spacing: 0.09em;

  color: #074e29;
  text-transform: uppercase;
  text-align: center;
}



  .participants{
  display: grid;
  grid-template-columns: repeat(var(--participants-count), var(--participant-size));
  gap: var(--participant-gap);

  width: fit-content;

  position: absolute;
  top: 200px;
  left: 50%;
  transform: translateX(-50%);
}

.participant{
  width: var(--participant-size);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.participant-photo{
  width: var(--participant-size);
  height: var(--participant-size);
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  box-shadow: var(--card-shadow);
  overflow: hidden;
}

.participant img{
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  object-position: center;
}

.participant-name{
  font-size: 14px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--title);
  text-align: center;
}

  .bottom{
  position: absolute;
  top: 480px;
  left: 50%;
  transform: translateX(-50%);
  width: fit-content;
}

  .days{
  display: grid;
  grid-template-columns: repeat(var(--days-count), var(--day-size));
  gap: var(--day-gap);

  width: fit-content;
}

  .day-card{
  width: var(--day-size);
  height: var(--day-size);
  padding: 10px;
  border-radius: 16px;
  background: var(--day-bg);
  border: 1px solid var(--day-border);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  text-align: center;
}


    .day-name{
      font-size: 15px;
      font-weight: 700;
      color: var(--title);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      margin-top: 40px;
    }

.day-date{
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

/* ===== COUNTDOWN: ОСНОВНЫЕ СТИЛИ, НЕ ВНУТРИ MEDIA ===== */

.countdown-wrap{
  position: absolute;
  top: 50px;
  right: 24px;
  width: min(320px, calc(100vw - 320px));
  min-height: 82px;

  display: none;
  align-items: center;
  justify-content: center;

  padding: 12px 16px;
  border-radius: 16px;
  background: rgba(255,255,255,0.72);
  border: 1px solid rgba(7, 78, 41, 0.10);
  box-shadow: 0 10px 24px rgba(0,0,0,0.05);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.countdown-wrap.show{
  display: flex;
}

.countdown{
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.countdown-title{
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--title);
  text-align: center;
}

.countdown-values{
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
}

.countdown-item{
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.countdown-number{
  font-size: clamp(18px, 2.4vw, 32px);
  font-weight: 800;
  line-height: 1;
  color: #111;
  font-variant-numeric: tabular-nums;
}

.countdown-label{
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--title);
}
@media (max-width: 1100px){
  .countdown-wrap{
    width: min(390px, calc(100vw - 280px));
  }
}

@media (max-width: 900px){
  .countdown-wrap{
    position: static;
    width: 100%;
    max-width: 560px;
    min-height: auto;
    margin: 0 auto 12px;
  }

  .participants{
    position: static;
    left: auto;
    top: auto;
    transform: none;
    margin: 0 auto;
  }

  .bottom{
    position: static;
    left: auto;
    top: auto;
    transform: none;
    margin: 24px auto 0;
    width: fit-content;
  }
}


@media (max-width: 560px){
  .page{
    padding: 22px 14px 24px;
  }

  }

  .participants{
    gap: var(--participant-gap);
  }

  .participant{

  .participant-name{

  }

  .day-name{
    font-size: 12px;
    margin-bottom: 3px;
  }

  .day-date{
    font-size: 12px;
  }
}
.day-card{
  position: relative;
}

.day-stage{
  position: absolute;
  top: 10px;
  right: 12px;

  font-size: 14px;
  font-weight: 700;

  color: rgba(7,78,41,0.25);

  letter-spacing: 0.05em;
}
  .day-stats{
  margin-top:10px;
  font-size:14px;
  font-weight:600;
  color: rgba(30,42,34,0.55);
}
.day-stats span:last-child{
  opacity:0.8;
}

.day-weather{
  position:absolute;
  top:10px;
  left:10px;

  width:28px;
  height:28px;

  display:flex;
  align-items:center;

}

.day-weather img{
  max-width:120%;
  max-height:120%;

  transform: translateY(1px);
}
.trip-summary{
  position: absolute;
  top: 360px;
  left: 50%;
  transform: translateX(-50%);

  width: min(500px, calc(100vw - 120px));
  padding: 16px 24px;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;

  border-radius: 18px;

  background: rgba(255,255,255,0.35);
  border: 1px solid rgba(7, 78, 41, 0.08);

  backdrop-filter: blur(6px);
}


.trip-summary-dates{
  font-size: 22px;
  font-weight: 800;
  color: var(--title);
  letter-spacing: 0.02em;
}


.trip-summary-meta{
  font-size: 16px;
  font-weight: 600;
  color: rgba(30,42,34,0.7);
}


.trip-summary-text{
  font-size: 14px;
  line-height: 1.4;
  color: rgba(30,42,34,0.62);
  text-align: center;
  max-width: 640px;
}
.trip-badge-logo{
  width: 185px;
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;

  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
}

.trip-badge-logo:hover{
  transform: translateY(-1px);
}

.trip-badge-logo:active{
  transform: translateY(1px);
}

.trip-badge-logo:focus-visible{
  outline: 2px solid rgba(7, 78, 41, 0.35);
  outline-offset: 6px;
  border-radius: 12px;
}

.day-card{
  cursor: pointer;
  transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
}

.day-card:hover{
  transform: translateY(-4px);
  box-shadow: 0 14px 28px rgba(0, 0, 0, 0.08);
  border-color: rgba(7, 78, 41, 0.18);
}

.day-card:active{
  transform: translateY(-1px);
}

.day-modal{
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  pointer-events: none;
}

.day-modal[aria-hidden="true"]{
  visibility: hidden;
}

.day-modal-backdrop{
  position: absolute;
  inset: 0;
  background: rgba(20, 27, 23, 0.22);
  opacity: 0;
  transition: opacity 0.28s ease;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}

.day-modal-dialog{
  position: relative;
  width: min(1020px, calc(100vw - 32px));
  height: min(85vh, 760px);
  max-height: 85vh;
  overflow: hidden;

  padding: 28px 26px 24px;
  border-radius: 22px;

  background: rgba(255,255,255,0.82);
  border: 1px solid rgba(7, 78, 41, 0.10);
  box-shadow: 0 22px 60px rgba(0,0,0,0.14);

  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  opacity: 0;
  transform: translateY(18px) scale(0.98);
  transition:
    opacity 0.28s ease,
    transform 0.30s ease;

  display: flex;
  flex-direction: column;
}

.day-modal.is-open{
  pointer-events: auto;
  visibility: visible;
}

.day-modal.is-open .day-modal-backdrop{
  opacity: 1;
}

.day-modal.is-open .day-modal-dialog{
  opacity: 1;
  transform: translateY(0) scale(1);
}

.day-modal-close{
  position: absolute;
  top: 12px;
  right: 12px;

  width: 38px;
  height: 38px;
  border: 0;
  border-radius: 12px;
  background: rgba(7, 78, 41, 0.06);
  color: var(--title);
  font-size: 26px;
  line-height: 1;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.2s ease;
}

.day-modal-close:hover{
  background: rgba(7, 78, 41, 0.10);
  transform: scale(1.03);
}

.day-modal-topline{
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 10px;
  min-height: 42px;
}


.day-modal-topline-spacer{
  width: 100%;
  height: 42px;
}



.day-modal-meta{
  position: absolute;
  right: 40px;

  top: 12px;
  height: 38px;

  display: flex;
  align-items: center;

  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: rgba(7, 78, 41, 0.58);

  line-height: 1;

  transform: translateY(-29px);
}






.day-modal-route-title{
  text-align: center;
  font-size: 24px;
  font-weight: 500;
  line-height: 1.15;
   color: var(--title);
  text-transform: uppercase;
  transform: translateY(-17px);
}

const dayModal = document.getElementById("dayModal");

function renderStageStars(count) {
  const safeCount = Math.max(0, Math.min(3, Number(count) || 0));

  stageStarsEl.innerHTML = "";

  for (let i = 1; i <= 3; i++) {
    const img = document.createElement("img");
    img.src = i <= safeCount
      ? "./image/icon/starall.png"
      : "./image/icon/star.png";
    img.alt = "";
    stageStarsEl.appendChild(img);
  }
}


function openDayModal(day, index) {
  dayModalMeta.textContent = `ЭТАП ${index + 1} · ${String(day.name).toUpperCase()} · ${day.date}`;
  dayModalTitle.textContent = (day.routeTitle || day.title || "МАРШРУТ ЭТАПА").toUpperCase();
  
  stageDistanceEl.textContent = `${day.km ?? "—"} км`;
  stageClimbEl.textContent = `${day.climb ?? "—"} м`;
  stageHeightEl.textContent = `${day.height ?? "—"} м`;
  stageDownEl.textContent = `${day.down ?? "—"} м`;

  stageTypeEl.textContent = day.stageType || "Горный";
  renderStageStars(day.stageStars);
  stageWeatherIcon.src = day.weather ? `./image/weather/${day.weather}` : "";
  stageWeatherIcon.alt = day.weather ? "Погода" : "";
  stageTempEl.textContent =
    day.tempMorning && day.tempDay
      ? `${day.tempMorning}…${day.tempDay}`
      : "—";

  dayModal.setAttribute("aria-hidden", "false");
  dayModal.classList.add("is-open");
  document.body.classList.add("modal-open");
}



function closeDayModal() {
  dayModal.setAttribute("aria-hidden", "true");
  dayModal.classList.remove("is-open");
  document.body.classList.remove("modal-open");
}


function pad(value) {
  return String(value).padStart(2, "0");
}

function stopCountdown() {
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
}

function resetCountdownView() {
  cdDays.textContent = "000";
  cdHours.textContent = "00";
  cdMinutes.textContent = "00";
  cdSeconds.textContent = "00";
  countdownWrap.classList.remove("show");
}

function startCountdown(targetDateString) {
  stopCountdown();

  if (!targetDateString) {
    resetCountdownView();
    return;
  }

  countdownWrap.classList.add("show");
  const targetDate = new Date(targetDateString);

  function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      cdDays.textContent = "0";
      cdHours.textContent = "00";
      cdMinutes.textContent = "00";
      cdSeconds.textContent = "00";
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);
    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    cdDays.textContent = String(days);
    cdHours.textContent = pad(hours);
    cdMinutes.textContent = pad(minutes);
    cdSeconds.textContent = pad(seconds);
  }

  updateCountdown();
  countdownInterval = setInterval(updateCountdown, 1000);
}

function formatNumber(value) {
  return new Intl.NumberFormat("ru-RU").format(value);
}

function getTripSummary(trip) {
  const days = Array.isArray(trip.days) ? trip.days : [];
  const participantsCount = Array.isArray(trip.participants) ? trip.participants.length : 0;

  const firstDate = days[0]?.date || "";
  const lastDate = days[days.length - 1]?.date || "";

  const totalKm = days.reduce((sum, day) => {
    return sum + (Number(day.km) || 0);
  }, 0);

  const totalClimb = days.reduce((sum, day) => {
    return sum + (Number(day.climb) || 0);
  }, 0);

  const hasRouteData = days.some(day => day.km !== undefined || day.climb !== undefined);

  const dates =
    firstDate && lastDate
      ? `${firstDate} — ${lastDate}`
      : trip.summary?.dates || "";

  let meta = `${days.length} этапов`;

  if (hasRouteData) {
    meta += ` · ${formatNumber(totalKm)} км · +${formatNumber(totalClimb)} м`;
  } else {
    meta += ` · маршрут формируется`;
  }

  meta += ` · ${participantsCount} участника`;

  return {
    dates,
    meta,
    text: trip.summary?.text || ""
  };
}


function renderTrip(year) {
  const trip = trips[year];
  if (!trip) return;

  activeTrip = year;
  badgeYear.textContent = activeTrip;

  const computedSummary = getTripSummary(trip);

tripDatesEl.textContent = computedSummary.dates;
tripMetaEl.textContent = computedSummary.meta;
tripTextEl.textContent = computedSummary.text;


  document.documentElement.style.setProperty("--participants-count", trip.participants.length);
  document.documentElement.style.setProperty("--days-count", trip.days.length);

  participantsEl.innerHTML = "";
  daysEl.innerHTML = "";

  trip.participants.forEach((p) => {
    const el = document.createElement("article");
    el.className = "participant";
    el.innerHTML = `
      <div class="participant-photo">
        <img src="${p.img}" alt="${p.name}">
      </div>
      <div class="participant-name">${p.name}</div>
    `;
    participantsEl.appendChild(el);
  });

  trip.days.forEach((d, i) => {
  const weatherHtml = d.weather
    ? `
      <div class="day-weather">
        <img src="./image/weather/${d.weather}" alt="">
      </div>
    `
    : "";

  const statsHtml = (d.km !== undefined || d.climb !== undefined)
    ? `
      <div class="day-stats">
        <span>${d.km ?? "—"} км</span>
        <span>↗ ${d.climb ?? "—"}</span>
      </div>
    `
    : "";

  const el = document.createElement("article");
  el.className = "day-card";
  el.innerHTML = `
    <div class="day-stage">${i + 1}</div>
    ${weatherHtml}
    <div class="day-name">${d.name}</div>
    <div class="day-date">${d.date}</div>
    ${statsHtml}
  `;

  el.addEventListener("click", () => {
    openDayModal(d, i);
  });

  daysEl.appendChild(el);
});
 

  startCountdown(trip.raceDate);
}

function toggleTrip() {
  const nextTrip = activeTrip === "2026" ? "2024" : "2026";
  renderTrip(nextTrip);
}
