<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <style>
    @font-face {
      font-family: 'DagestanCustom';
      src: url('./DagestaN%20.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root{
  --bg: #f6f6f4;
  --title: #074e29;
  --text: #1e2a22;
  --muted: rgba(30, 42, 34, 0.66);
  --card: rgba(255, 255, 255, 0.68);
  --card-border: rgba(7, 78, 41, 0.10);
  --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
  --day-bg: rgba(255, 255, 255, 0.72);
  --day-border: rgba(7, 78, 41, 0.12);

  --participant-size: 100px;
  --participant-gap: 20px;

  --day-size: 140px;
  --day-gap: 12px;
}

    *{
      box-sizing: border-box;
    }

    html,
    body{
      margin: 0;
      min-height: 100%;
    }

    body{
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    body::after{
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: min(260px, 32vh);
      background: url('./dagestan-footer.svg') bottom center / cover no-repeat;
      opacity: 0.55;
      pointer-events: none;
      z-index: -2;
    }

    body::before{
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: min(320px, 40vh);
      background: linear-gradient(
        to top,
        rgba(246, 246, 244, 0) 0%,
        rgba(246, 246, 244, 0.72) 48%,
        rgba(246, 246, 244, 1) 100%
      );
      pointer-events: none;
      z-index: -1;
    }

    .page{
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 28px 24px 34px;
      position: relative;
      z-index: 1;
    }

    .top{
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .title{
  margin: 0;
  font-family: 'DagestanCustom', serif;
  font-size: clamp(30px, 7vw, 90px);
  font-weight: 400;
  line-height: 1;
  letter-spacing: 0.03em;
  color: var(--title);
  text-transform: uppercase;
  text-align: center;

  max-width: calc(100% - 260px);
}
.trip-badge{
  position: absolute;

  top: 10px;      /* выше */
  left: 40px;     /* теперь слева */

  width: 200px;

  display: flex;
  flex-direction: column;
  align-items: center;

  z-index: 5;
}

.trip-badge-year{
  position: absolute;
  top: 30px;
  right: -60px;

  font-family: 'DagestanCustom', serif;
  font-size: 28px;
  font-weight: 400;
width: 200px;
  letter-spacing: 0.05em;
  color: #074e29;
display: flex;
  flex-direction: column;
  align-items: center;
  transform: rotate(0deg) translate(0,-5px);
text-shadow: 0 3px 6px rgba(0,0,0,0.15);
  z-index: 5;
}

.trip-badge-logo{
  width: 185px;
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.trip-badge-logo img{
  max-width: 100%;
  max-height: 100%;
  display: block;
  object-fit: contain;
}

.trip-badge-name{
  position: relative;

  top: -8px;      /* вниз / вверх */
  left: 0px;     /* вправо / влево */

  margin-top: 0;

  font-family: 'DagestanCustom', serif;
  font-size: 38px;
  line-height: 0.95;
  letter-spacing: 0.09em;

  color: #074e29;
  text-transform: uppercase;
  text-align: center;
}



  .participants{
  display: grid;
  grid-template-columns: repeat(var(--participants-count), var(--participant-size));
  gap: var(--participant-gap);

  width: fit-content;

  position: absolute;
  top: 200px;
  left: 50%;
  transform: translateX(-50%);
}

.participant{
  width: var(--participant-size);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.participant-photo{
  width: var(--participant-size);
  height: var(--participant-size);
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  box-shadow: var(--card-shadow);
  overflow: hidden;
}

.participant img{
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  object-position: center;
}

.participant-name{
  font-size: 14px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--title);
  text-align: center;
}

  .bottom{
  position: absolute;
  top: 380px;
  left: 50%;
  transform: translateX(-50%);
  width: fit-content;
}

  .days{
  display: grid;
  grid-template-columns: repeat(var(--days-count), var(--day-size));
  gap: var(--day-gap);

  width: fit-content;
}

  .day-card{
  width: var(--day-size);
  height: var(--day-size);
  padding: 10px;
  border-radius: 16px;
  background: var(--day-bg);
  border: 1px solid var(--day-border);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

    .day-name{
      font-size: 15px;
      font-weight: 700;
      color: var(--title);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

.day-date{
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

/* ===== COUNTDOWN: ОСНОВНЫЕ СТИЛИ, НЕ ВНУТРИ MEDIA ===== */

.countdown-wrap{
  position: absolute;
  top: 50px;
  right: 24px;
  width: min(320px, calc(100vw - 320px));
  min-height: 82px;

  display: none;
  align-items: center;
  justify-content: center;

  padding: 12px 16px;
  border-radius: 16px;
  background: rgba(255,255,255,0.72);
  border: 1px solid rgba(7, 78, 41, 0.10);
  box-shadow: 0 10px 24px rgba(0,0,0,0.05);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.countdown-wrap.show{
  display: flex;
}

.countdown{
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.countdown-title{
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--title);
  text-align: center;
}

.countdown-values{
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
}

.countdown-item{
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.countdown-number{
  font-size: clamp(18px, 2.4vw, 32px);
  font-weight: 800;
  line-height: 1;
  color: #111;
  font-variant-numeric: tabular-nums;
}

.countdown-label{
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--title);
}
@media (max-width: 1100px){
  .countdown-wrap{
    width: min(390px, calc(100vw - 280px));
  }
}

@media (max-width: 900px){
  .countdown-wrap{
    position: static;
    width: 100%;
    max-width: 560px;
    min-height: auto;
    margin: 0 auto 12px;
  }

  .participants{
    position: static;
    left: auto;
    top: auto;
    transform: none;
    margin: 0 auto;
  }

  .bottom{
    position: static;
    left: auto;
    top: auto;
    transform: none;
    margin: 24px auto 0;
    width: fit-content;
  }
}


@media (max-width: 560px){
  .page{
    padding: 22px 14px 24px;
  }

  :root{
    --participant-size: 84px;
    --participant-gap: 12px;

    --day-size: 72px;
    --day-gap: 10px;
  }

  .participants{
    gap: var(--participant-gap);
  }

  .participant{
    width: var(--participant-size);
    gap: 6px;
  }

  .participant-photo{
    width: var(--participant-size);
    height: var(--participant-size);
    border-radius: 16px;
  }

  .participant-name{
    font-size: 13px;
  }

  .day-name{
    font-size: 12px;
    margin-bottom: 3px;
  }

  .day-date{
    font-size: 12px;
  }
}
.day-card{
  position: relative;
}

.day-stage{
  position: absolute;
  top: 10px;
  right: 12px;

  font-size: 14px;
  font-weight: 700;

  color: rgba(7,78,41,0.25);

  letter-spacing: 0.05em;
}
  .day-stats{
  margin-top:10px;
  font-size:14px;
  font-weight:600;
  color: rgba(30,42,34,0.55);
}
.day-stats span:last-child{
  opacity:0.8;
}

.day-weather{
  position:absolute;
  top:10px;
  left:10px;

  width:28px;
  height:28px;

  display:flex;
  align-items:center;
  justify-content:center;
}

.day-weather img{
  max-width:120%;
  max-height:120%;
  object-fit:contain;
  transform: translateY(1px);
}





  </style>
</head>
<body>
  <main class="page">

<section class="top">

  <aside class="trip-badge">
    <div class="trip-badge-year" id="badgeYear"></div>

    <div class="trip-badge-logo">
      <img src="./image/logo.png" alt="Dagestan logo">
    </div>

    <div class="trip-badge-name">DAGESTAN</div>
  </aside>
  <div class="countdown-wrap" id="countdownWrap">
    <div class="countdown">
      <div class="countdown-title">Старт через</div>

      <div class="countdown-values">
        <div class="countdown-item">
          <div class="countdown-number" id="cdDays">000</div>
          <div class="countdown-label">Дней</div>
        </div>

        <div class="countdown-item">
          <div class="countdown-number" id="cdHours">00</div>
          <div class="countdown-label">Часов</div>
        </div>

        <div class="countdown-item">
          <div class="countdown-number" id="cdMinutes">00</div>
          <div class="countdown-label">Мин</div>
        </div>

        <div class="countdown-item">
          <div class="countdown-number" id="cdSeconds">00</div>
          <div class="countdown-label">Сек</div>
        </div>
      </div>
    </div>
  </div>

  <div class="participants" id="participants"></div>

</section>

<section class="bottom">
  <div class="days" id="days"></div>
</section>

  </main>

  <script>

const ACTIVE_TRIP = "2024";

document.getElementById("badgeYear").textContent = ACTIVE_TRIP;

const trips = {

  "2024": {

    title: "Dagestan 2024",
    raceDate: null,
    participants: [
      {name:"Саша", img:"./image/people/sasha.png"},
      {name:"Паша", img:"./image/people/pasha.png"},
      {name:"Катя", img:"./image/people/kate.png"},
      {name:"Олег", img:"./image/people/oleg.png"}
    ],

    days: [
  {name:"Сб", date:"28.09", km:96, climb:2100, weather:"sun.png"},
{name:"Вс", date:"29.09", km:82, climb:1600, weather:"cloudsun.png"},
{name:"Пн", date:"30.09", km:110, climb:2400, weather:"rain.png"},
{name:"Вт", date:"01.10", km:75, climb:1800, weather:"cloud.png"},
{name:"Ср", date:"02.10", km:90, climb:2100, weather:"sun.png"},
{name:"Чт", date:"03.10", km:105, climb:2500, weather:"thinder.png"},
{name:"Пт", date:"04.10", km:88, climb:1700, weather:"cloudsun.png"},
{name:"Сб", date:"05.10", km:70, climb:900, weather:"sun.png"}

]

  },

  "2026": {

    title: "Dagestan 2026",
    raceDate: "2026-05-22T02:10:00",

    participants: [
      {name:"Саша", img:"./image/people/sasha.png"},
      {name:"Олег", img:"./image/people/olegT.png"}
    ],

    days: [
      {name:"Пт", date:"22.05"},
      {name:"Сб", date:"23.05"},
      {name:"Вс", date:"24.05"},
      {name:"Пн", date:"25.05"},
      {name:"Вт", date:"26.05"},
      {name:"Чт", date:"27.05"},
      {name:"Пт", date:"28.05"},
      {name:"Сб", date:"29.05"},
      {name:"Вс", date:"30.05"},
    ]

  }

};


const trip = trips[ACTIVE_TRIP];

document.documentElement.style.setProperty("--participants-count", trip.participants.length);
document.documentElement.style.setProperty("--days-count", trip.days.length);

const participantsEl = document.getElementById("participants");

trip.participants.forEach(p => {

  const el = document.createElement("article");
  el.className = "participant";

  el.innerHTML = `
    <div class="participant-photo">
      <img src="${p.img}" alt="${p.name}">
    </div>
    <div class="participant-name">${p.name}</div>
  `;

  participantsEl.appendChild(el);

});


const daysEl = document.getElementById("days");

trip.days.forEach((d, i) => {

  const el = document.createElement("article");
  el.className = "day-card";

  el.innerHTML = `
  <div class="day-stage">${i + 1}</div>

  <div class="day-weather">
    <img src="./image/weather/${d.weather}">
  </div>

  <div class="day-name">${d.name}</div>
  <div class="day-date">${d.date}</div>

  <div class="day-stats">
    <span>${d.km} км</span>
    <span>↗ ${d.climb}</span>
  </div>
`;


  daysEl.appendChild(el);

});
const countdownWrap = document.getElementById("countdownWrap");
const cdDays = document.getElementById("cdDays");
const cdHours = document.getElementById("cdHours");
const cdMinutes = document.getElementById("cdMinutes");
const cdSeconds = document.getElementById("cdSeconds");

function pad(value){
  return String(value).padStart(2, "0");
}

function startCountdown(targetDateString){
  if (!targetDateString) return;

  countdownWrap.classList.add("show");

  const targetDate = new Date(targetDateString);

  function updateCountdown(){
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0){
      cdDays.textContent = "0";
      cdHours.textContent = "00";
      cdMinutes.textContent = "00";
      cdSeconds.textContent = "00";
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);
    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    cdDays.textContent = String(days);
    cdHours.textContent = pad(hours);
    cdMinutes.textContent = pad(minutes);
    cdSeconds.textContent = pad(seconds);
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
}

startCountdown(trip.raceDate);
</script>
</body>
</html>
